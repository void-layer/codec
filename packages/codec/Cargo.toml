[package]
name = "void-layer-codec"
version = "0.0.1"
edition = "2024"
license = "MIT"
description = "Canonical Invoice codec — TLV wire format, Brotli via JS shim"
repository = "https://github.com/void-layer/codec"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
thiserror = "2"
phf = { version = "0.11", features = ["macros"] }
ruint = { version = "1", default-features = false }
tiny-keccak = { version = "2", features = ["keccak"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
dlmalloc = { version = "0.2", features = ["global"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
js-sys = "0.3"
serde_json = "1"

# proptest pulls getrandom 0.3 / wait-timeout which don't build for wasm32 — see spec 056 plan-2c C8.
[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
proptest = "1"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
incremental = false
