[package]
name = "void-layer-codec"
version = "0.0.1"
edition = "2024"
license = "MIT"
description = "Canonical Invoice codec — TLV + Brotli wire format"
repository = "https://github.com/void-layer/codec"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde-wasm-bindgen = "0.6"
serde_json = "1"
tsify = { version = "0.4", features = ["js"] }
thiserror = "2"
phf = { version = "0.11", features = ["macros"] }
tiny-keccak = { version = "2", features = ["keccak"] }
brotli-decompressor = "4"

[target.'cfg(target_arch = "wasm32")'.dependencies]
dlmalloc = { version = "0.2", features = ["global"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"
js-sys = "0.3"
proptest = "1"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
incremental = false
