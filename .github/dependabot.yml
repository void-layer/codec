version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      changesets:
        patterns: ["@changesets/*"]
      typescript:
        patterns: ["typescript", "@types/*"]
  - package-ecosystem: "cargo"
    directory: "/packages/codec"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
